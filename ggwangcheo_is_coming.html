<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>꽝처님 오신 날🙏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;overflow-x:hidden;background:#0d0500;font-family:'Noto Serif KR',Georgia,serif}

/* 별 */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff9e0;border-radius:50%;animation:twinkle var(--d,2s) infinite alternate}
@keyframes twinkle{0%{opacity:.1}100%{opacity:1}}

/* 연등 */
#lanterns{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-around;z-index:3;pointer-events:none}
.lantern{display:flex;flex-direction:column;align-items:center;animation:swing var(--s,3s) ease-in-out infinite alternate;transform-origin:top center}
.l-str{width:2px;height:55px;background:#7a5c10}
.l-body{width:38px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#ffd700;border:2px solid #8b0000;box-shadow:0 0 18px rgba(255,80,0,.7)}
.l-red{background:radial-gradient(circle at 35% 35%,#ff6a00,#c0392b)}
.l-gold{background:radial-gradient(circle at 35% 35%,#f5c518,#b8860b)}
.l-tas{width:2px;height:25px}
@keyframes swing{0%{transform:rotate(-7deg)}100%{transform:rotate(7deg)}}
@keyframes glow{0%,100%{text-shadow:0 0 40px rgba(255,200,0,.9),0 3px 6px #000}50%{text-shadow:0 0 80px rgba(255,220,0,1),0 0 20px rgba(255,180,0,.9),0 3px 6px #000}}

/* ══════════ PAGE 1: INTRO ══════════ */
#page1{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:#0d0500;overflow-y:auto;padding:60px 16px 24px}

.intro-top{position:relative;z-index:2;text-align:center;margin-bottom:14px;animation:fadeDown .8s ease both .2s;opacity:0;animation-fill-mode:forwards}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
.intro-eyebrow{font-size:13px;letter-spacing:5px;color:#d4a017;margin-bottom:6px}
.intro-title{font-size:clamp(26px,7vw,58px);font-weight:900;color:#ffd700;animation:glow 3s ease-in-out infinite;line-height:1.1}
.intro-sub{font-size:clamp(11px,2.5vw,17px);color:#f5e6c8;letter-spacing:3px;margin-top:6px}

/* 유튜브 썸네일 */
.yt-wrap{position:relative;z-index:2;width:min(500px,88vw);margin-bottom:14px;animation:fadeDown .9s ease both .5s;opacity:0;animation-fill-mode:forwards}
.yt-thumb{position:relative;width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;border:2px solid rgba(212,160,23,.5);box-shadow:0 0 40px rgba(255,160,0,.2);cursor:pointer;background:#000}
.yt-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s}
.yt-thumb:hover img{opacity:.85}
.yt-play{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.yt-play-btn{width:64px;height:64px;background:rgba(255,0,0,.88);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(255,0,0,.5);transition:transform .2s}
.yt-thumb:hover .yt-play-btn{transform:scale(1.12)}
.yt-play-icon{width:0;height:0;border-top:16px solid transparent;border-bottom:16px solid transparent;border-left:26px solid #fff;margin-left:5px}
.yt-play-label{font-size:12px;color:#f5e6c8;letter-spacing:2px;text-shadow:0 1px 4px rgba(0,0,0,.8)}

/* 인트로 스테이지 */
.stage-row{position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:center;gap:10px;width:min(660px,96vw);margin-bottom:10px}
.char-slot{display:flex;flex-direction:column;align-items:center;width:130px;cursor:pointer}
.char-anim-wrap{width:120px;height:170px;position:relative;overflow:hidden;border-radius:12px;transition:transform .2s,box-shadow .2s}
.char-slot:hover .char-anim-wrap{transform:scale(1.05);box-shadow:0 0 20px rgba(255,215,0,.4)}
.char-anim-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;transition:opacity .05s}
.char-label{margin-top:5px;font-size:12px;font-weight:700;color:#ffd700;letter-spacing:2px;text-shadow:0 0 8px rgba(255,200,0,.7)}
.click-hint{font-size:9px;color:#a08050;margin-top:2px;letter-spacing:1px}
.char-left{animation:walkR 1.1s cubic-bezier(.22,1,.36,1) both .6s}
.char-right{animation:walkL 1.1s cubic-bezier(.22,1,.36,1) both .8s}
@keyframes walkR{from{transform:translateX(-160px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes walkL{from{transform:translateX(160px);opacity:0}to{transform:translateX(0);opacity:1}}
.bubble{background:rgba(20,8,0,.9);border:1px solid rgba(212,160,23,.65);border-radius:10px;padding:8px 12px;font-size:11px;color:#f5e6c8;text-align:center;line-height:1.7;flex:1;align-self:center;animation:fadeDown 1s ease both 2.2s;opacity:0;animation-fill-mode:forwards}

/* 입장 버튼 */
.enter-btn{position:relative;z-index:2;background:linear-gradient(135deg,#b8860b,#ffd700,#b8860b);color:#1a0a00;font-size:14px;font-weight:900;padding:12px 40px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;letter-spacing:3px;box-shadow:0 0 40px rgba(255,215,0,.5);animation:fadeDown .8s ease both 2.8s,pulse 2s ease-in-out infinite 3.8s;opacity:0;animation-fill-mode:forwards;transition:transform .2s}
.enter-btn:hover{transform:scale(1.07)}
@keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(255,215,0,.5)}50%{box-shadow:0 0 70px rgba(255,215,0,.85)}}

/* ══════════ PAGE 2: MAIN ══════════ */
#page2{display:none;position:relative;z-index:2;min-height:100vh}

/* 히어로 */
.hero{text-align:center;padding:100px 20px 40px;background:linear-gradient(to bottom,transparent,rgba(13,5,0,.6))}
.eyebrow{font-size:13px;letter-spacing:6px;color:#d4a017;margin-bottom:10px}
.hero-title{font-size:clamp(32px,9vw,72px);font-weight:900;color:#ffd700;text-shadow:0 0 40px rgba(255,200,0,.8),0 4px 8px rgba(0,0,0,.8);line-height:1.1;animation:glow 3s ease-in-out infinite;margin-bottom:8px}
.hero-sub{font-size:clamp(14px,3.5vw,22px);color:#f5e6c8;letter-spacing:3px;margin-bottom:24px}
.date-badge{display:inline-block;background:rgba(255,215,0,.12);border:1px solid #d4a017;padding:8px 26px;border-radius:999px;font-size:14px;color:#ffd700;letter-spacing:4px}

/* 꽝처님 강림 섹션 */
.ggwang-section{text-align:center;padding:20px 20px 0}
.ggwang-section-title{font-size:clamp(16px,4vw,26px);color:#ffd700;letter-spacing:2px;margin-bottom:6px}
.ggwang-section-sub{font-size:12px;color:#a08050;letter-spacing:2px;margin-bottom:16px}
.ggwang-img{width:min(360px,70vw);animation:float 4s ease-in-out infinite;filter:drop-shadow(0 0 28px rgba(255,215,0,.7));display:block;margin:0 auto}
@keyframes float{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-12px) rotate(.5deg)}}

.lotus{text-align:center;font-size:26px;color:#d4a017;letter-spacing:10px;margin:28px 0}

/* 서유기 일행 섹션 */
.seo-section{padding:0 16px 60px}
.sec-title{text-align:center;font-size:clamp(17px,4.5vw,28px);color:#ffd700;margin-bottom:6px;letter-spacing:2px}
.sec-hint{text-align:center;font-size:11px;color:#a08050;margin-bottom:28px;letter-spacing:2px}

/* 카드 그리드 - 이미지 카드 */
.char-cards{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;max-width:900px;margin:0 auto}
.char-card{width:clamp(140px,20vw,180px);text-align:center;cursor:pointer;transition:transform .3s}
.char-card:hover{transform:translateY(-8px)}
.char-card-img{width:100%;aspect-ratio:1/1;object-fit:contain;filter:drop-shadow(0 0 12px rgba(255,215,0,.3));transition:filter .3s}
.char-card:hover .char-card-img{filter:drop-shadow(0 0 20px rgba(255,215,0,.6))}
.char-card-name{font-size:16px;font-weight:900;color:#ffd700;margin-top:8px;letter-spacing:1px;text-shadow:0 0 8px rgba(255,200,0,.5)}
.char-card-sub{font-size:10px;color:#a08050;margin-top:3px;letter-spacing:1px}

/* 말풍선 팝업 (카드 클릭시) */
.speech-popup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:150;align-items:center;justify-content:center;padding:20px}
.speech-popup.open{display:flex}
.speech-box{background:linear-gradient(145deg,#1a0800,#2d1200);border:2px solid rgba(212,160,23,.6);border-radius:20px;padding:32px 28px;max-width:440px;width:100%;text-align:center;animation:popIn .35s ease both;position:relative}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.speech-char-img{width:120px;height:120px;object-fit:contain;display:block;margin:0 auto 12px;filter:drop-shadow(0 0 12px rgba(255,215,0,.5))}
.speech-name{font-size:20px;font-weight:900;color:#ffd700;margin-bottom:3px}
.speech-role{font-size:11px;color:#a08050;letter-spacing:3px;margin-bottom:16px}
.speech-msg{font-size:14px;color:#f5e6c8;line-height:2;background:rgba(255,215,0,.05);border:1px solid rgba(212,160,23,.2);border-radius:10px;padding:16px;text-align:left}
.speech-close{margin-top:18px;background:none;border:1px solid #555;color:#888;padding:8px 22px;border-radius:999px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.speech-close:hover{border-color:#d4a017;color:#d4a017}

/* 편지 모달 */
#letterModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:20px}
#letterModal.open{display:flex}
.letter-box{background:linear-gradient(145deg,#1a0800,#2d1200);border:2px solid rgba(212,160,23,.6);border-radius:20px;padding:36px 30px;max-width:480px;width:100%;text-align:center;animation:popIn .4s ease both;max-height:85vh;overflow-y:auto;}
.letter-box::-webkit-scrollbar{width:5px}
.letter-box::-webkit-scrollbar-track{background:rgba(255,215,0,.1);border-radius:10px}
.letter-box::-webkit-scrollbar-thumb{background:rgba(212,160,23,.6);border-radius:10px}
.letter-char-img{width:30%;max-width:90px;height:auto;object-fit:contain;display:block;margin:0 auto 12px;filter:drop-shadow(0 0 10px rgba(255,215,0,.5))}
.letter-name{font-size:20px;font-weight:900;color:#ffd700;margin-bottom:3px}
.letter-role{font-size:11px;color:#a08050;letter-spacing:3px;margin-bottom:20px}
.letter-content{font-size:14px;color:#f5e6c8;line-height:2.1;background:rgba(255,215,0,.05);border:1px solid rgba(212,160,23,.2);border-radius:12px;padding:18px;text-align:left}
.letter-sig{margin-top:14px;font-size:12px;color:#d4a017;letter-spacing:2px}
.letter-close{margin-top:18px;background:none;border:1px solid #555;color:#888;padding:8px 22px;border-radius:999px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.letter-close:hover{border-color:#d4a017;color:#d4a017}

/* 파티 */
.fw{position:fixed;width:7px;height:7px;border-radius:50%;pointer-events:none;z-index:999;animation:fwFly 1.2s ease-out forwards}
@keyframes fwFly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
</style>
</head>
<body>

<div id="stars"></div>
<div id="lanterns"></div>

<!-- ══ 편지 모달 ══ -->
<div id="letterModal">
  <div class="letter-box">
    <img class="letter-char-img" id="lImg" src="" alt="">
    <div class="letter-name" id="lName"></div>
    <div class="letter-role" id="lRole"></div>
    <div class="letter-content" id="lContent"></div>
    <div class="letter-sig" id="lSig"></div>
    <button class="letter-close" onclick="closeLetter()">닫기 ✕</button>
  </div>
</div>

<!-- ══ 서유기 말풍선 팝업 ══ -->
<div class="speech-popup" id="speechPopup">
  <div class="speech-box">
    <img class="speech-char-img" id="spImg" src="" alt="">
    <div class="speech-name" id="spName"></div>
    <div class="speech-role" id="spRole"></div>
    <div class="speech-msg" id="spMsg"></div>
    <button class="speech-close" onclick="closeSpeech()">닫기 ✕</button>
  </div>
</div>

<!-- ══════════ PAGE 1: INTRO ══════════ -->
<section id="page1">
  <div class="intro-top">
    <p class="intro-eyebrow">☸ 꽝림 24년 ☸</p>
    <h1 class="intro-title">꽝처님 오신 날</h1>
    <p class="intro-sub">황세현의 탄강을 경축하옵나이다</p>
  </div>

  <div class="yt-wrap">

function openLetter(who){

/* ── 서유기 말풍선 ── */
function openSpeech(c){
  document.getElementById('spImg').src=c.img;
  document.getElementById('spName').textContent=c.name;
  document.getElementById('spRole').textContent=c.role;
  document.getElementById('spMsg').innerHTML=c.msg.replace(/\n/g,'<br>');
  document.getElementById('speechPopup').classList.add('open');
}
function closeSpeech(){document.getElementById('speechPopup').classList.remove('open')}

/* ── 폭죽 ── */
function fireworks(){
  const cols=['#ffd700','#ff6b6b','#a8e6cf','#ffd3b6','#ff8fab','#c7f2a4'];
  for(let b=0;b<6;b++)setTimeout(()=>{
    const ox=15+Math.random()*70,oy=5+Math.random()*40;
    for(let p=0;p<18;p++){
      const el=document.createElement('div');el.className='fw';
      const a=(p/18)*360,dist=50+Math.random()*90,rad=a*Math.PI/180;
      el.style.cssText='left:'+ox+'%;top:'+oy+'%;background:'+cols[Math.floor(Math.random()*cols.length)]+';--tx:'+Math.cos(rad)*dist+'px;--ty:'+Math.sin(rad)*dist+'px;animation-delay:'+Math.random()*.3+'s';
      document.body.appendChild(el);setTimeout(()=>el.remove(),1500);
    }
  },b*280);
}
